server:
  port: ${PORT:8082}

spring:
  datasource:
    url: ${DB_URL}
    username: postgres.rktozresjijfertgcqet
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: 604800000

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true